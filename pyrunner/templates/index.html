<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Run01 — Browser Python IDE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- TOP NAV -->
  <header class="nav">
    <div class="nav-brand">
      <span class="brand-text-run">RUN</span>
      <span class="brand-badge-01">01</span>
      <span class="brand-tagline">Browser Python</span>
    </div>

    <div class="nav-status">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-label" id="statusLabel">Loading Run01…</span>
    </div>

    <div class="nav-actions">
      <button class="btn btn-ghost" id="btnClear" title="Clear output">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/></svg>
        Clear
      </button>
      <button class="btn btn-ghost" id="btnReset" title="Reset to starter code">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/></svg>
        Reset
      </button>
      <button class="btn btn-run" id="btnRun" disabled>
        <span class="run-icon">▶</span>
        <span>Run</span>
        <kbd>⌘↵</kbd>
      </button>
    </div>
  </header>

  <!-- MAIN SPLIT -->
  <main class="workspace">

    <!-- EDITOR PANE -->
    <section class="pane pane-editor">
      <div class="pane-header">
        <span class="pane-label">
          <span class="pill pill-py">PY</span>
          main.py
        </span>
        <div class="editor-meta" id="editorMeta">ln 1, col 1</div>
      </div>
      <div id="editor" class="editor-mount"></div>
    </section>

    <!-- RESIZE HANDLE -->
    <div class="resize-handle" id="resizeHandle"></div>

    <!-- OUTPUT PANE -->
    <section class="pane pane-output">
      <div class="pane-header">
        <span class="pane-label">
          <span class="pill pill-out">OUT</span>
          console
        </span>
        <div class="output-meta" id="outputMeta">ready</div>
      </div>
      <div id="output" class="output-mount">
        <div class="output-welcome">
          <div class="welcome-prompt"><span class="prompt-caret">❯</span> Run01 is loading…</div>
        </div>
      </div>
    </section>

  </main>

  <!-- Monaco loader -->
  <script>
    var require = { paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs' } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs/loader.js"></script>

  <!-- Pyodide -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

  <!-- App logic -->
  <script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
